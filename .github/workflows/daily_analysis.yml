# 毎日の自動データ収集・分析・通知パイプライン
#
# 実行タイミング:
#   日本株: 14:30 JST（= 05:30 UTC）取引時間中のリアルタイムスクリーニング
#   米国株: 07:00 JST（= 22:00 UTC前日）米国市場閉場後
#
# 実行内容:
#   1. TradingViewからスクリーニング結果を取得・CSV保存
#   2. 累積データ更新
#   3. MLモデル & フィルターランキング更新
#   4. AI予測90%以上の銘柄をLINE通知

name: 📊 日次データ収集 & LINE通知

on:
  schedule:
    # 日本株: 月〜金 05:30 UTC（= 14:30 JST）
    - cron: '30 5 * * 1-5'
    # 米国株: 月〜金 22:00 UTC（= 翌07:00 JST）
    - cron: '0 22 * * 1-5'
  workflow_dispatch:  # 手動実行も可能

jobs:
  # ============================
  # 日本株パイプライン
  # ============================
  japan-stocks:
    if: github.event.schedule == '30 5 * * 1-5' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📥 コードをチェックアウト
        uses: actions/checkout@v4

      - name: 🐍 Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 依存パッケージをインストール
        run: pip install -r requirements.txt

      - name: 📡 日本株 日次データ収集 & LINE通知
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: python daily_collect.py

      - name: 📤 結果をコミット＆プッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results/ -A
          git diff --cached --quiet || git commit -m "📊 日本株データ自動収集 $(TZ=Asia/Tokyo date '+%Y-%m-%d %H:%M')"
          git push

  # ============================
  # 米国株パイプライン
  # ============================
  us-stocks:
    if: github.event.schedule == '0 22 * * 1-5'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📥 コードをチェックアウト
        uses: actions/checkout@v4

      - name: 🐍 Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 依存パッケージをインストール
        run: pip install -r requirements.txt

      - name: 📡 米国株 日次データ収集
        run: python us_daily_collect.py

      - name: 📤 結果をコミット＆プッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add us_results/ -A
          git diff --cached --quiet || git commit -m "📊 米国株データ自動収集 $(TZ=America/New_York date '+%Y-%m-%d %H:%M')"
          git push
