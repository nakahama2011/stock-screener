# 毎日取引終了後に自動で以下を実行するワークフロー:
# 1. TradingViewスクリーニング結果を日次CSVで保存
# 2. 累積データを更新
# 3. MLモデルとフィルターランキングを再計算
#
# 東証取引終了（15:00 JST）+ データ反映待ち → 16:30 JST（= 07:30 UTC）
# 米国市場終了（16:00 EST / 06:00 JST）+ 反映待ち → 08:00 JST（= 23:00 UTC前日）

name: 📊 日次データ収集 & 分析更新

on:
  schedule:
    # 月〜金の 07:30 UTC（= 16:30 JST）に実行（日本株メイン）
    - cron: '30 7 * * 1-5'
  workflow_dispatch:  # 手動実行も可能

jobs:
  daily-collect:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📥 コードをチェックアウト
        uses: actions/checkout@v4

      - name: 🐍 Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 依存パッケージをインストール
        run: pip install -r requirements.txt

      - name: 📡 日次データ収集パイプライン実行
        run: python daily_collect.py

      - name: 📤 結果をコミット＆プッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results/ -A
          git diff --cached --quiet || git commit -m "📊 日次データ自動収集 $(TZ=Asia/Tokyo date '+%Y-%m-%d')"
          git push
